spring:
  application:
    name: trash-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trash?currentSchema=public}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      connection-init-sql: create schema if not exists public
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        default_schema: public
    show-sql: ${JPA_SHOW_SQL:false}
  messages:
    basename: i18n/messages
  jackson:
    property-naming-strategy: SNAKE_CASE

springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    enabled: true
    path: /swagger

scalar:
  url: ${SCALAR_OPENAPI_URL:http://localhost:8080/openapi.json}
  path: /scalar
  enabled: ${SCALAR_ENABLED:true}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret-change-this-development-secret}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
